<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Cipher AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="king-logo.png" type="image/png">
    <!-- tsParticles CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="king-logo.png" alt="King Cipher" class="sidebar-logo">
            <h1>KING CIPHER</h1>
            <p class="subtitle">ALL-SEEING • CHAOS REIGNS</p>
        </div>
        
        <button id="new-chat-btn" class="new-chat">✦ NEW DIMENSION</button>
        
        <div class="time-display" id="time-display"></div>
        
        <div class="chat-history" id="chat-history"></div>

        <div class="sidebar-footer">
            <button id="owner-btn">👁️ OWNER MODE</button>
            <button id="theme-toggle">🌑</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <h1>KING CIPHER AI</h1>
            <p class="subtitle">Supreme Triangular Overlord</p>
        </header>

        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <div class="input-area">
            <div class="input-tools">
                <label class="upload-btn">📸 <input type="file" id="image-upload" accept="image/*" hidden></label>
                <button id="generate-image-btn">🎨 Generate</button>
            </div>
            <textarea id="prompt" placeholder="Command me, mortal..."></textarea>
            <button id="send">SUMMON CHAOS</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
