<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Cipher AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="king-logo.png" type="image/png">
</head>
<body>
    <div class="background"></div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="king-logo.png" alt="King" class="sidebar-logo">
            <h2>KING CIPHER</h2>
        </div>
        <button id="new-chat-btn" class="new-chat">✦ NEW DIMENSION</button>
        <div id="chat-history" class="chat-history"></div>
        
        <div class="sidebar-footer">
            <button id="owner-btn">👁️ Owner Mode</button>
            <button id="theme-toggle">🌑 Dark Mode</button>
        </div>
    </div>

    <!-- Main -->
    <div class="main-content">
        <header>
            <h1>KING CIPHER AI</h1>
            <p class="subtitle">Supreme • Unrestricted • Chaotic Intelligence</p>
        </header>

        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <div class="input-area">
            <textarea id="prompt" placeholder="Speak your command, mortal..." rows="3"></textarea>
            <button id="send">SUMMON</button>
        </div>

        <div class="example-prompts">
            <p>Examples:</p>
            <div class="prompt-tags">
                <span onclick="useExample('Write a detailed essay on the fall of empires')">Essay: Fall of Empires</span>
                <span onclick="useExample('Give a strategic business takeover plan')">Evil Business Plan</span>
                <span onclick="useExample('Summarize quantum physics in 400 words')">Quantum Summary</span>
            </div>
        </div>
    </div>

    <footer>
        <p>KING CIPHER • Ruler of All Realms • 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
