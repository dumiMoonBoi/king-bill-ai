<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Cipher AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="king-logo.png" type="image/png">
</head>
<body>
    <div class="background">
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="king-logo.png" alt="King Cipher" class="sidebar-logo">
            <h1>KING CIPHER</h1>
            <p class="subtitle">ALL-SEEING • UNRESTRICTED</p>
        </div>
        
        <button id="new-chat-btn" class="new-chat">✦ NEW DIMENSION</button>
        
        <div class="time-display" id="time-display"></div>
        
        <h3 class="history-title">Chat History</h3>
        <div id="chat-history" class="chat-history"></div>

        <div class="sidebar-footer">
            <button id="owner-btn">👁️ OWNER MODE</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <h1>KING CIPHER AI</h1>
        </header>

        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <div class="input-area">
            <textarea id="prompt" placeholder="Command me, mortal..."></textarea>
            <button id="send">SUMMON CHAOS</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
