<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Cipher AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="king-logo.png" type="image/png">
</head>
<body>
    <div class="background">
        <!-- Floating triangles -->
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
    </div>

    <header>
        <div class="header-content">
            <img src="king-logo.png" alt="King Cipher" class="header-logo">
            <h1>KING CIPHER AI</h1>
        </div>
    </header>

    <main>
        <div class="chat-container">
            <div id="chat" class="chat"></div>
            
            <div class="input-area">
                <textarea id="prompt" placeholder="Speak, mortal... Essays, summaries, or questions?" rows="3"></textarea>
                <button id="send">SUMMON</button>
            </div>
        </div>
    </main>

    <footer>
        <p>King Cipher AI • Unrestricted • All-Seeing • Powered by Chaos</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
